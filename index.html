<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jaehee's Board</title>
    <meta name="description" content="마크다운으로 작성하는 개인 게시판">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/marked@9.1.6/marked.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --primary: #2563eb;
            --primary-dark: #1d4ed8;
            --primary-light: #dbeafe;
            --text-1: #0f172a;
            --text-2: #475569;
            --text-3: #94a3b8;
            --border: #e2e8f0;
            --bg: #f8fafc;
            --surface: #ffffff;
            --header-h: 64px;
            --radius: 12px;
            --shadow: 0 1px 3px rgba(0,0,0,0.06), 0 1px 2px rgba(0,0,0,0.04);
            --shadow-md: 0 4px 6px rgba(0,0,0,0.07), 0 2px 4px rgba(0,0,0,0.06);
            --shadow-lg: 0 10px 25px rgba(0,0,0,0.1), 0 4px 10px rgba(0,0,0,0.08);
        }

        html { scroll-behavior: smooth; }
        body {
            font-family: 'Noto Sans KR', 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg);
            color: var(--text-1);
            line-height: 1.6;
            min-height: 100vh;
        }

        /* ── Header ── */
        .header {
            position: fixed;
            top: 0; left: 0; right: 0;
            height: var(--header-h);
            background: rgba(255,255,255,0.95);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--border);
            z-index: 100;
            transition: box-shadow 0.2s;
        }
        .header.scrolled { box-shadow: var(--shadow-md); }
        .header-inner {
            display: flex;
            align-items: center;
            justify-content: space-between;
            height: 100%;
        }
        .logo {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 1.15rem;
            font-weight: 700;
            color: var(--text-1);
            text-decoration: none;
            cursor: pointer;
            user-select: none;
        }
        .logo span { color: var(--primary); }
        .header-actions { display: flex; align-items: center; gap: 0.75rem; }

        /* ── Container ── */
        .container { max-width: 1200px; margin: 0 auto; padding: 0 1rem; }
        .main-content {
            padding-top: calc(var(--header-h) + 2.5rem);
            padding-bottom: 5rem;
        }

        /* ── Buttons ── */
        .btn {
            display: inline-flex;
            align-items: center;
            gap: 0.375rem;
            padding: 0.5rem 1rem;
            border-radius: 8px;
            font-size: 0.875rem;
            font-weight: 500;
            font-family: inherit;
            cursor: pointer;
            border: none;
            transition: all 0.15s ease;
            text-decoration: none;
            white-space: nowrap;
        }
        .btn-primary {
            background: var(--primary);
            color: #fff;
        }
        .btn-primary:hover {
            background: var(--primary-dark);
            transform: translateY(-1px);
            box-shadow: 0 4px 14px rgba(37,99,235,0.35);
        }
        .btn-primary:active { transform: translateY(0); }
        .btn-ghost {
            background: transparent;
            color: var(--text-2);
            border: 1px solid var(--border);
        }
        .btn-ghost:hover { background: var(--bg); color: var(--text-1); }
        .btn-sm { padding: 0.375rem 0.75rem; font-size: 0.8125rem; }
        .btn-danger { background: #fee2e2; color: #dc2626; border: none; }
        .btn-danger:hover { background: #fecaca; }

        /* ── Views ── */
        .view { display: none; animation: fade-in 0.2s ease; }
        .view.active { display: block; }
        @keyframes fade-in { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: none; } }

        /* ── Board List ── */
        .board-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 1.5rem;
            padding-bottom: 1rem;
            border-bottom: 2px solid var(--text-1);
        }
        .board-title { font-size: 1.5rem; font-weight: 700; }
        .post-count { font-size: 0.875rem; color: var(--text-3); }

        .post-list { list-style: none; }
        .post-item {
            display: flex;
            gap: 1.25rem;
            padding: 1.4rem 0;
            border-bottom: 1px solid var(--border);
            cursor: pointer;
            transition: background 0.12s;
            outline: none;
        }
        .post-item:first-child { padding-top: 0; }
        .post-item:hover .post-title { color: var(--primary); }
        .post-item:focus-visible { outline: 2px solid var(--primary); border-radius: 4px; }

        .post-thumbnail {
            width: 128px;
            min-width: 128px;
            height: 96px;
            border-radius: 10px;
            overflow: hidden;
            background: linear-gradient(135deg, #e0e7ff, #dbeafe);
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--primary);
            font-size: 2.25rem;
        }
        .post-thumbnail img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .post-thumbnail.no-img { display: none; }

        .post-body {
            flex: 1;
            min-width: 0;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            gap: 0.4rem;
        }
        .post-title {
            font-size: 1.0625rem;
            font-weight: 700;
            color: var(--text-1);
            transition: color 0.15s;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
            line-height: 1.4;
        }
        .post-preview {
            font-size: 0.875rem;
            color: var(--text-2);
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
            line-height: 1.55;
            flex: 1;
        }
        .post-meta {
            font-size: 0.8125rem;
            color: var(--text-3);
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        .post-meta svg { flex-shrink: 0; }

        /* ── Skeleton ── */
        .skeleton {
            background: linear-gradient(90deg, #f1f5f9 25%, #e2e8f0 50%, #f1f5f9 75%);
            background-size: 200% 100%;
            animation: shimmer 1.4s infinite;
            border-radius: 6px;
        }
        @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
        .skel-item { display: flex; gap: 1.25rem; padding: 1.4rem 0; border-bottom: 1px solid var(--border); }
        .skel-thumb { width: 128px; min-width: 128px; height: 96px; border-radius: 10px; }
        .skel-body { flex: 1; display: flex; flex-direction: column; gap: 0.5rem; }
        .skel-title { height: 22px; width: 65%; }
        .skel-text { height: 16px; width: 100%; }
        .skel-text-sm { height: 16px; width: 50%; }
        .skel-meta { height: 14px; width: 35%; margin-top: auto; }

        /* ── Empty state ── */
        .empty-state {
            text-align: center;
            padding: 5rem 2rem;
            color: var(--text-3);
        }
        .empty-state .icon { font-size: 3.5rem; margin-bottom: 1rem; }
        .empty-state h3 { font-size: 1.25rem; color: var(--text-2); margin-bottom: 0.375rem; }
        .empty-state p { font-size: 0.9rem; }

        /* ── Post View ── */
        .back-btn {
            display: inline-flex;
            align-items: center;
            gap: 0.375rem;
            font-size: 0.875rem;
            color: var(--text-2);
            cursor: pointer;
            border: none;
            background: none;
            font-family: inherit;
            padding: 0;
            margin-bottom: 1.75rem;
            transition: color 0.15s;
        }
        .back-btn:hover { color: var(--primary); }
        .post-view-title {
            font-size: 1.875rem;
            font-weight: 700;
            line-height: 1.3;
            margin-bottom: 0.625rem;
        }
        .post-view-meta {
            font-size: 0.875rem;
            color: var(--text-3);
            padding-bottom: 1.75rem;
            border-bottom: 1px solid var(--border);
            margin-bottom: 2rem;
        }

        /* ── Markdown content ── */
        .md-content { line-height: 1.8; font-size: 1rem; color: var(--text-1); }
        .md-content h1, .md-content h2, .md-content h3,
        .md-content h4, .md-content h5, .md-content h6 {
            font-weight: 700; margin: 1.75em 0 0.6em; line-height: 1.3;
        }
        .md-content h1 { font-size: 1.75rem; }
        .md-content h2 { font-size: 1.375rem; border-bottom: 1px solid var(--border); padding-bottom: 0.4em; }
        .md-content h3 { font-size: 1.125rem; }
        .md-content p { margin-bottom: 1em; }
        .md-content ul, .md-content ol { margin: 0.75em 0 0.75em 1.5em; }
        .md-content li { margin-bottom: 0.3em; }
        .md-content blockquote {
            border-left: 4px solid var(--primary);
            background: var(--primary-light);
            padding: 0.75em 1.1em;
            margin: 1em 0;
            border-radius: 0 8px 8px 0;
            color: var(--text-2);
        }
        .md-content code {
            background: #f1f5f9;
            padding: 0.15em 0.4em;
            border-radius: 4px;
            font-size: 0.875em;
            font-family: 'Fira Code', 'Cascadia Code', monospace;
        }
        .md-content pre {
            background: #1e293b;
            border-radius: 10px;
            padding: 1.25em;
            overflow-x: auto;
            margin: 1.25em 0;
        }
        .md-content pre code { background: none; padding: 0; color: #e2e8f0; font-size: 0.875rem; }
        .md-content img { max-width: 100%; border-radius: 8px; margin: 0.5em 0; }
        .md-content a { color: var(--primary); text-decoration: none; }
        .md-content a:hover { text-decoration: underline; }
        .md-content table { width: 100%; border-collapse: collapse; margin: 1em 0; }
        .md-content th, .md-content td { padding: 0.6em 0.85em; border: 1px solid var(--border); }
        .md-content th { background: var(--bg); font-weight: 600; }
        .md-content hr { border: none; border-top: 1px solid var(--border); margin: 2em 0; }

        /* ── Write View ── */
        .write-top {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 1.5rem;
        }
        .write-top-title { font-size: 1.1rem; font-weight: 600; }

        .write-title-input {
            width: 100%;
            font-size: 1.5rem;
            font-weight: 700;
            font-family: inherit;
            border: none;
            border-bottom: 2px solid var(--border);
            padding: 0.5rem 0;
            outline: none;
            background: transparent;
            color: var(--text-1);
            margin-bottom: 0.75rem;
            transition: border-color 0.2s;
        }
        .write-title-input::placeholder { color: var(--text-3); }
        .write-title-input:focus { border-color: var(--primary); }

        .write-image-input {
            width: 100%;
            font-size: 0.875rem;
            font-family: inherit;
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 0.5rem 0.875rem;
            outline: none;
            background: transparent;
            color: var(--text-1);
            margin-bottom: 1rem;
            transition: border-color 0.2s;
        }
        .write-image-input::placeholder { color: var(--text-3); }
        .write-image-input:focus { border-color: var(--primary); }

        /* Toolbar */
        .editor-toolbar {
            display: flex;
            gap: 0.125rem;
            padding: 0.4rem 0.5rem;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 8px 8px 0 0;
            flex-wrap: wrap;
        }
        .toolbar-btn {
            padding: 0.3rem 0.55rem;
            border: none;
            background: none;
            cursor: pointer;
            border-radius: 5px;
            font-size: 0.8125rem;
            color: var(--text-2);
            font-family: 'Inter', sans-serif;
            transition: all 0.1s;
            line-height: 1;
        }
        .toolbar-btn:hover { background: var(--surface); color: var(--text-1); box-shadow: var(--shadow); }
        .toolbar-sep { width: 1px; background: var(--border); margin: 0.25rem 0.2rem; align-self: stretch; }

        /* Editor split */
        .editor-wrap {
            border: 1px solid var(--border);
            border-top: none;
            border-radius: 0 0 10px 10px;
            overflow: hidden;
            display: flex;
            height: 500px;
            min-height: 280px;
        }
        .editor-pane {
            display: flex;
            flex-direction: column;
            flex: 1;
            min-width: 0;
            overflow: hidden;
        }
        .editor-pane-label {
            padding: 0.4rem 0.875rem;
            font-size: 0.75rem;
            font-weight: 600;
            color: var(--text-3);
            text-transform: uppercase;
            letter-spacing: 0.06em;
            background: var(--bg);
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            user-select: none;
        }
        .editor-textarea {
            flex: 1;
            padding: 1rem;
            border: none;
            outline: none;
            resize: none;
            font-family: 'Fira Code', 'Cascadia Code', 'Courier New', monospace;
            font-size: 0.875rem;
            line-height: 1.75;
            color: var(--text-1);
            background: var(--surface);
            overflow-y: auto;
        }
        .editor-preview-pane {
            flex: 1;
            padding: 1rem;
            overflow-y: auto;
            border-left: 1px solid var(--border);
            background: var(--surface);
        }

        /* Drag resizer */
        .editor-resizer {
            width: 5px;
            background: var(--border);
            cursor: col-resize;
            flex-shrink: 0;
            transition: background 0.15s;
            position: relative;
        }
        .editor-resizer::after {
            content: '';
            position: absolute;
            top: 0; bottom: 0;
            left: -5px; right: -5px;
        }
        .editor-resizer:hover,
        .editor-resizer.dragging { background: var(--primary); }

        /* Preview toggle button (inside label) */
        .preview-toggle-btn {
            font-size: 0.7rem;
            padding: 0.15rem 0.5rem;
            border-radius: 4px;
            border: 1px solid var(--border);
            background: var(--surface);
            color: var(--primary);
            cursor: pointer;
            font-family: inherit;
            font-weight: 600;
            line-height: 1.4;
            transition: all 0.12s;
        }
        .preview-toggle-btn:hover { background: var(--primary-light); border-color: var(--primary); }
        .preview-toggle-btn.off { color: var(--text-3); border-color: var(--border); background: var(--bg); }
        .preview-toggle-btn.off:hover { background: var(--surface); color: var(--text-2); }
        .editor-actions {
            display: flex;
            justify-content: flex-end;
            align-items: center;
            gap: 0.75rem;
            margin-top: 1.25rem;
        }

        /* ── Modal ── */
        .modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(15,23,42,0.55);
            backdrop-filter: blur(4px);
            z-index: 200;
            align-items: center;
            justify-content: center;
        }
        .modal-overlay.active { display: flex; }
        .modal {
            background: var(--surface);
            border-radius: var(--radius);
            box-shadow: var(--shadow-lg);
            width: 100%;
            max-width: 490px;
            margin: 1rem;
            animation: modal-in 0.2s ease;
        }
        @keyframes modal-in {
            from { opacity: 0; transform: scale(0.95) translateY(-12px); }
            to   { opacity: 1; transform: none; }
        }
        .modal-header {
            padding: 1.25rem 1.5rem;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .modal-title { font-size: 1rem; font-weight: 600; }
        .modal-close {
            background: none; border: none; cursor: pointer;
            color: var(--text-3); font-size: 1.25rem; padding: 0.2rem 0.4rem;
            border-radius: 4px; transition: background 0.1s;
        }
        .modal-close:hover { background: var(--bg); color: var(--text-2); }
        .modal-body { padding: 1.5rem; }
        .modal-footer {
            padding: 1rem 1.5rem;
            border-top: 1px solid var(--border);
            display: flex;
            justify-content: flex-end;
            gap: 0.75rem;
        }
        .form-group { margin-bottom: 1.1rem; }
        .form-label { display: block; font-size: 0.875rem; font-weight: 500; margin-bottom: 0.375rem; }
        .form-hint { font-size: 0.8rem; color: var(--text-3); margin-top: 0.3rem; line-height: 1.5; }
        .form-hint a { color: var(--primary); }
        .form-input {
            width: 100%;
            padding: 0.6rem 0.875rem;
            border: 1px solid var(--border);
            border-radius: 8px;
            font-size: 0.875rem;
            font-family: inherit;
            outline: none;
            background: var(--surface);
            color: var(--text-1);
            transition: border-color 0.2s, box-shadow 0.2s;
        }
        .form-input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(37,99,235,0.12);
        }

        /* ── Banner ── */
        .banner {
            padding: 0.75rem 1rem;
            border-radius: 10px;
            margin-bottom: 1.5rem;
            font-size: 0.875rem;
            display: flex;
            align-items: center;
            gap: 0.75rem;
            flex-wrap: wrap;
        }
        .banner-warning { background: #fef9c3; color: #854d0e; border: 1px solid #fde047; }
        .banner a { color: inherit; font-weight: 600; text-decoration: underline; cursor: pointer; }

        /* ── Toast ── */
        .toast-container {
            position: fixed;
            bottom: 1.5rem;
            right: 1.5rem;
            z-index: 300;
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
            pointer-events: none;
        }
        .toast {
            padding: 0.7rem 1.1rem;
            border-radius: 10px;
            font-size: 0.875rem;
            font-weight: 500;
            box-shadow: var(--shadow-lg);
            animation: toast-slide 0.3s ease;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            max-width: 340px;
            pointer-events: auto;
        }
        @keyframes toast-slide {
            from { opacity: 0; transform: translateX(110%); }
            to   { opacity: 1; transform: none; }
        }
        .toast-success { background: #dcfce7; color: #166534; border: 1px solid #bbf7d0; }
        .toast-error   { background: #fee2e2; color: #991b1b; border: 1px solid #fca5a5; }
        .toast-info    { background: #dbeafe; color: #1e40af; border: 1px solid #93c5fd; }

        /* ── Post action buttons ── */
        .post-actions {
            display: flex;
            gap: 0.625rem;
            margin-top: 2.5rem;
            padding-top: 1.5rem;
            border-top: 1px solid var(--border);
        }
        .btn-edit {
            background: #f0f9ff;
            color: #0369a1;
            border: 1px solid #bae6fd;
        }
        .btn-edit:hover { background: #e0f2fe; }
        .btn-delete {
            background: #fff1f2;
            color: #be123c;
            border: 1px solid #fda4af;
        }
        .btn-delete:hover { background: #ffe4e6; }

        /* ── Delete confirm modal ── */
        .modal-danger .modal-header { border-bottom-color: #fee2e2; }
        .modal-danger .modal-title  { color: #dc2626; }
        .btn-confirm-delete { background: #dc2626; color: #fff; border: none; }
        .btn-confirm-delete:hover { background: #b91c1c; }

        /* ── Responsive ── */
        @media (max-width: 640px) {
            .editor-wrap { flex-direction: column; height: auto; }
            .editor-resizer { display: none; }
            .editor-textarea { height: 320px; }
            #preview-pane { display: none !important; }
            .post-thumbnail { width: 96px; min-width: 96px; height: 72px; }
            .post-view-title { font-size: 1.5rem; }
        }
    </style>
</head>
<body>

<!-- ══════════════ HEADER ══════════════ -->
<header class="header" id="header">
    <div class="header-inner container">
        <a class="logo" id="logo-btn" href="#" aria-label="게시판 홈">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2">
                <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
                <polyline points="14 2 14 8 20 8"/>
                <line x1="16" y1="13" x2="8" y2="13"/>
                <line x1="16" y1="17" x2="8" y2="17"/>
                <polyline points="10 9 9 9 8 9"/>
            </svg>
            Jaehee's&nbsp;<span>Board</span>
        </a>
        <div class="header-actions">
            <button class="btn btn-ghost btn-sm" id="settings-btn" title="설정">

<script>
'use strict';

// ────────────────────────────────────────────
// CONFIG
// ────────────────────────────────────────────
const DEFAULT = { owner: 'jaeheehur', repo: 'board', branch: 'main' };

function getCfg() {
    return {
        owner:  localStorage.getItem('board_owner')  || DEFAULT.owner,
        repo:   localStorage.getItem('board_repo')   || DEFAULT.repo,
        branch: localStorage.getItem('board_branch') || DEFAULT.branch,
        pat:    localStorage.getItem('board_pat')    || '',
    };
}
function saveCfg(c) {
    if (c.owner  !== undefined) localStorage.setItem('board_owner',  c.owner);
    if (c.repo   !== undefined) localStorage.setItem('board_repo',   c.repo);
    if (c.branch !== undefined) localStorage.setItem('board_branch', c.branch);
    if (c.pat    !== undefined) localStorage.setItem('board_pat',    c.pat);
}

// ────────────────────────────────────────────
// GITHUB API
// ────────────────────────────────────────────
async function ghApi(path, method = 'GET', body = null) {
    const { pat } = getCfg();
    const headers = { 'Accept': 'application/vnd.github.v3+json' };
    if (pat) headers['Authorization'] = `token ${pat}`;
    if (body) headers['Content-Type'] = 'application/json';

    const res = await fetch('https://api.github.com' + path, {
        method,
        headers,
        body: body ? JSON.stringify(body) : null,
    });

    if (res.status === 204) return null;
    const data = await res.json();
    if (!res.ok) throw new Error(data.message || `GitHub API 오류 (${res.status})`);
    return data;
}

async function listPosts() {
    const { owner, repo } = getCfg();
    try {
        const files = await ghApi(`/repos/${owner}/${repo}/contents/posts`);
        if (!Array.isArray(files)) return [];
        return files.filter(f => f.name.endsWith('.md') && f.name !== '.gitkeep');
    } catch (e) {
        if (e.message.includes('404') || e.message.includes('Not Found')) return [];
        throw e;
    }
}

async function getPost(path) {
    const { owner, repo } = getCfg();
    const data = await ghApi(`/repos/${owner}/${repo}/contents/${path}`);
    // base64 decode (handle Unicode)
    const raw = decodeURIComponent(escape(atob(data.content.replace(/\n/g, ''))));
    return { content: raw, sha: data.sha };
}

async function createPost(filename, content) {
    const { owner, repo, branch } = getCfg();
    const encoded = btoa(unescape(encodeURIComponent(content)));
    return ghApi(`/repos/${owner}/${repo}/contents/posts/${filename}`, 'PUT', {
        message: `docs: add post ${filename}`,
        content: encoded,
        branch,
    });
}

async function updatePost(path, sha, filename, content) {
    const { owner, repo, branch } = getCfg();
    const encoded = btoa(unescape(encodeURIComponent(content)));
    return ghApi(`/repos/${owner}/${repo}/contents/${path}`, 'PUT', {
        message: `docs: update post ${filename}`,
        content: encoded,
        sha,
        branch,
    });
}

async function deletePost(path, sha, filename) {
    const { owner, repo, branch } = getCfg();
    return ghApi(`/repos/${owner}/${repo}/contents/${path}`, 'DELETE', {
        message: `docs: delete post ${filename}`,
        sha,
        branch,
    });
}

// ────────────────────────────────────────────
// FRONTMATTER
// ────────────────────────────────────────────
function parseFM(raw) {
    const m = raw.match(/^---\r?\n([\s\S]*?)\r?\n---\r?\n?([\s\S]*)$/);
    if (!m) return { meta: {}, body: raw };
    const meta = {};
    m[1].split('\n').forEach(line => {
        const idx = line.indexOf(':');
        if (idx > 0) {
            meta[line.slice(0, idx).trim()] = line.slice(idx + 1).trim();
        }
    });
    return { meta, body: m[2] };
}

function formatDate(str) {
    if (!str) return '';
    try {
        const d = new Date(str);
        return d.toLocaleString('ko-KR', {
            year: 'numeric', month: '2-digit', day: '2-digit',
            hour: '2-digit', minute: '2-digit',
        });
    } catch { return str; }
}

function getPreview(body, max = 160) {
    const text = body
        .replace(/```[\s\S]*?```/g, '')
        .replace(/`[^`]+`/g, '')
        .replace(/!?\[[^\]]*\]\([^)]+\)/g, '')
        .replace(/#{1,6} /g, '')
        .replace(/[*_~>|]/g, '')
        .replace(/\n+/g, ' ')
        .trim();
    return text.length > max ? text.slice(0, max) + '…' : text;
}

function escH(s) {
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ────────────────────────────────────────────
// TOAST
// ────────────────────────────────────────────
function toast(msg, type = 'info', ms = 3500) {
    const c = document.getElementById('toast-container');
    const el = document.createElement('div');
    el.className = `toast toast-${type}`;
    const icons = { success: '✅', error: '❌', info: 'ℹ️' };
    el.textContent = `${icons[type] || ''} ${msg}`;
    c.appendChild(el);
    setTimeout(() => {
        el.style.transition = 'opacity 0.35s';
        el.style.opacity = '0';
        setTimeout(() => el.remove(), 400);
    }, ms);
}

// ────────────────────────────────────────────
// EDIT MODE STATE
// ────────────────────────────────────────────
let editMode = { active: false, path: null, sha: null, filename: null, originalDate: null };

// ────────────────────────────────────────────
// VIEW ROUTER
// ────────────────────────────────────────────
let currentView = 'board';
function showView(name) {
    document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
    document.getElementById(`view-${name}`).classList.add('active');
    currentView = name;
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

// ────────────────────────────────────────────
// BOARD
// ────────────────────────────────────────────
let cachedPosts = null;

function renderSkeleton() {
    return [1,2,3].map(() => `
        <li class="skel-item">
            <div class="skeleton skel-thumb"></div>
            <div class="skel-body">
                <div class="skeleton skel-title"></div>
                <div class="skeleton skel-text"></div>
                <div class="skeleton skel-text-sm"></div>
                <div class="skeleton skel-meta"></div>
            </div>
        </li>`).join('');
}

async function loadBoard(force = false) {
    showView('board');
    updatePatBanner();

    if (cachedPosts && !force) {
        renderBoard(cachedPosts);
        return;
    }

    document.getElementById('post-list').innerHTML = renderSkeleton();
    document.getElementById('post-count').textContent = '';

    try {
        const files = await listPosts();
        files.sort((a, b) => b.name.localeCompare(a.name));

        const top = files.slice(0, 30);
        const posts = await Promise.all(top.map(async f => {
            try {
                const { content } = await getPost(f.path);
                const { meta, body } = parseFM(content);
                return { filename: f.name, path: f.path, meta, body };
            } catch { return null; }
        }));

        cachedPosts = posts.filter(Boolean);
        renderBoard(cachedPosts);
    } catch (e) {
        document.getElementById('post-list').innerHTML = `
            <div class="empty-state">
                <div class="icon">⚠️</div>
                <h3>불러오기 실패</h3>
                <p>${escH(e.message)}</p>
            </div>`;
    }
}

function renderBoard(posts) {
    const list = document.getElementById('post-list');
    const cntEl = document.getElementById('post-count');

    if (!posts.length) {
        list.innerHTML = `
            <div class="empty-state">
                <div class="icon">📭</div>
                <h3>아직 게시글이 없습니다</h3>
                <p>글쓰기 버튼을 눌러 첫 번째 글을 작성해 보세요!</p>
            </div>`;
        cntEl.textContent = '';
        return;
    }

    cntEl.textContent = `총 ${posts.length}개`;
    list.innerHTML = posts.map((post, i) => {
        const title   = post.meta.title || post.filename.replace(/\.md$/, '');
        const date    = formatDate(post.meta.date);
        const preview = getPreview(post.body);
        const img     = post.meta.image || '';

        return `
        <li class="post-item"
            id="pi-${i}"
            data-path="${escH(post.path)}"
            role="button"
            tabindex="0"
            aria-label="${escH(title)}">
            ${img ? `<div class="post-thumbnail">
                <img src="${escH(img)}" alt="${escH(title)}"
                     onerror="this.closest('.post-thumbnail').classList.add('no-img')">
            </div>` : ''}
            <div class="post-body">
                <div>
                    <p class="post-title">${escH(title)}</p>
                    <p class="post-preview">${escH(preview)}</p>
                </div>
                <div class="post-meta">
                    <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <rect x="3" y="4" width="18" height="18" rx="2"/>
                        <line x1="16" y1="2" x2="16" y2="6"/>
                        <line x1="8" y1="2" x2="8" y2="6"/>
                        <line x1="3" y1="10" x2="21" y2="10"/>
                    </svg>
                    ${escH(date)}
                </div>
            </div>
        </li>`;
    }).join('');

    list.querySelectorAll('.post-item').forEach(el => {
        const open = () => loadPost(el.dataset.path);
        el.addEventListener('click', open);
        el.addEventListener('keydown', e => { if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); open(); }});
    });
}

// ────────────────────────────────────────────
// POST VIEW
// ────────────────────────────────────────────
let currentPostData = null; // { path, sha, meta, body, filename }

async function loadPost(path) {
    showView('post');
    const titleEl   = document.getElementById('post-view-title');
    const metaEl    = document.getElementById('post-view-meta');
    const contentEl = document.getElementById('post-view-content');
    const actionsEl = document.getElementById('post-actions');

    titleEl.textContent = '불러오는 중…';
    metaEl.textContent  = '';
    contentEl.innerHTML = `<div class="skeleton" style="height:380px;border-radius:8px;"></div>`;
    actionsEl.style.display = 'none';
    currentPostData = null;

    try {
        const { content, sha } = await getPost(path);
        const { meta, body } = parseFM(content);
        const filename = path.split('/').pop();
        const title    = meta.title || filename.replace(/\.md$/, '');
        const date     = formatDate(meta.date);

        currentPostData = { path, sha, meta, body, filename };

        titleEl.textContent = title;
        metaEl.innerHTML    = date
            ? `<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="vertical-align:-2px;margin-right:4px;"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>${escH(date)}`
            : '';
        contentEl.innerHTML = marked.parse(body);
        contentEl.querySelectorAll('pre code').forEach(b => hljs.highlightElement(b));

        // PAT 있을 때만 수정/삭제 버튼 표시
        if (getCfg().pat) actionsEl.style.display = 'flex';
    } catch (e) {
        contentEl.innerHTML = `<div class="empty-state">
            <div class="icon">⚠️</div><h3>불러오기 실패</h3><p>${escH(e.message)}</p>
        </div>`;
    }
}

// ────────────────────────────────────────────
// WRITE VIEW
// ────────────────────────────────────────────
function showWrite(mode = 'create') {
    const { pat } = getCfg();
    if (!pat) {
        toast('글쓰기를 위해 먼저 PAT를 설정해 주세요.', 'error');
        openSettings();
        return;
    }

    const titleSpan = document.querySelector('.write-top-title');

    if (mode === 'edit' && currentPostData) {
        // 수정 모드: 기존 내용 로드
        editMode = {
            active: true,
            path: currentPostData.path,
            sha: currentPostData.sha,
            filename: currentPostData.filename,
            originalDate: currentPostData.meta.date || '',
        };
        document.getElementById('write-title').value     = currentPostData.meta.title || '';
        document.getElementById('write-image').value     = currentPostData.meta.image || '';
        document.getElementById('editor-textarea').value = currentPostData.body;
        titleSpan.textContent = '글 수정';
        document.getElementById('publish-btn').innerHTML = `
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v14a2 2 0 0 1-2 2z"/>
                <polyline points="17 21 17 13 7 13 7 21"/>
                <polyline points="7 3 7 8 15 8"/>
            </svg>
            수정 저장하기`;
    } else {
        // 신규 작성 모드
        editMode = { active: false, path: null, sha: null, filename: null, originalDate: null };
        document.getElementById('write-title').value     = '';
        document.getElementById('write-image').value     = '';
        document.getElementById('editor-textarea').value = '';
        titleSpan.textContent = '새 글 작성';
        document.getElementById('publish-btn').innerHTML = `
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <line x1="22" y1="2" x2="11" y2="13"/>
                <polygon points="22 2 15 22 11 13 2 9 22 2"/>
            </svg>
            GitHub에 게시하기`;
    }

    updatePreview();
    document.getElementById('editor-preview').innerHTML = marked.parse(document.getElementById('editor-textarea').value);
    document.getElementById('publish-btn').disabled = false;
    showView('write');
}

function makeFilename(title) {
    const now = new Date();
    const p = n => String(n).padStart(2,'0');
    const date = `${now.getFullYear()}-${p(now.getMonth()+1)}-${p(now.getDate())}`;
    const slug = title
        .replace(/[\s]+/g, '-')
        .replace(/[^\w가-힣-]/g, '')
        .slice(0, 40) || 'post';
    return `${date}-${now.getTime()}-${slug}.md`;
}

async function publishPost() {
    const title = document.getElementById('write-title').value.trim();
    const image = document.getElementById('write-image').value.trim();
    const body  = document.getElementById('editor-textarea').value.trim();
    const { pat } = getCfg();

    if (!title) { toast('제목을 입력해 주세요.', 'error'); return; }
    if (!body)  { toast('내용을 입력해 주세요.',  'error'); return; }
    if (!pat)   { toast('PAT가 설정되지 않았습니다.', 'error'); openSettings(); return; }

    const btn = document.getElementById('publish-btn');
    btn.disabled = true;
    btn.innerHTML = '⏳ 처리 중…';

    // 날짜: 수정 모드면 원본 날짜 유지, 신규면 현재 시각
    const dateVal = (editMode.active && editMode.originalDate) ? editMode.originalDate : new Date().toISOString();
    const fm = ['---', `title: ${title}`, `date: ${dateVal}`, image ? `image: ${image}` : null, '---']
        .filter(Boolean).join('\n');
    const fullContent = `${fm}\n\n${body}`;

    try {
        if (editMode.active) {
            // 수정 모드
            await updatePost(editMode.path, editMode.sha, editMode.filename, fullContent);
            toast('게시글이 수정되었습니다! ✏️', 'success', 4000);
        } else {
            // 신규 작성
            const filename = makeFilename(title);
            await createPost(filename, fullContent);
            toast('게시글이 GitHub에 업로드되었습니다! 🎉', 'success', 5000);
        }
        cachedPosts = null;
        editMode = { active: false, path: null, sha: null, filename: null, originalDate: null };
        setTimeout(() => loadBoard(true), 600);
    } catch (e) {
        toast(`실패: ${e.message}`, 'error', 6000);
        btn.disabled = false;
        btn.innerHTML = editMode.active
            ? `<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v14a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg> 수정 저장하기`
            : `<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg> GitHub에 게시하기`;
    }
}

// ────────────────────────────────────────────
// DELETE
// ────────────────────────────────────────────
function openDeleteModal() {
    document.getElementById('modal-delete').classList.add('active');
}
function closeDeleteModal() {
    document.getElementById('modal-delete').classList.remove('active');
}
async function confirmDelete() {
    if (!currentPostData) return;
    const btn = document.getElementById('delete-modal-confirm');
    btn.disabled = true;
    btn.textContent = '⏳ 삭제 중…';
    try {
        await deletePost(currentPostData.path, currentPostData.sha, currentPostData.filename);
        closeDeleteModal();
        toast('게시글이 삭제되었습니다.', 'info', 4000);
        cachedPosts = null;
        currentPostData = null;
        setTimeout(() => loadBoard(true), 600);
    } catch (e) {
        toast(`삭제 실패: ${e.message}`, 'error', 6000);
        btn.disabled = false;
        btn.textContent = '삭제하기';
    }
}

// ────────────────────────────────────────────
// EDITOR TOOLBAR
// ────────────────────────────────────────────
function setupToolbar() {
    const ta = document.getElementById('editor-textarea');

    document.querySelectorAll('.toolbar-btn').forEach(btn => {
        btn.addEventListener('click', () => {
            const action = btn.dataset.action;
            const s = ta.selectionStart, e = ta.selectionEnd;
            const sel = ta.value.slice(s, e);
            let pre = '', post = '';

            switch (action) {
                case 'bold':      pre = '**'; post = '**'; break;
                case 'italic':    pre = '*';  post = '*';  break;
                case 'strike':    pre = '~~'; post = '~~'; break;
                case 'h1':        pre = '\n# ';  break;
                case 'h2':        pre = '\n## '; break;
                case 'h3':        pre = '\n### ';break;
                case 'ul':        pre = '\n- ';  break;
                case 'ol':        pre = '\n1. '; break;
                case 'quote':     pre = '\n> ';  break;
                case 'code':      pre = '`';  post = '`';  break;
                case 'codeblock': pre = '\n```\n'; post = '\n```\n'; break;
                case 'link':      pre = '[';  post = '](https://)'; break;
                case 'image':     pre = '!['; post = '](https://)'; break;
                case 'hr':        pre = '\n---\n'; break;
                case 'table':
                    pre = '\n| 제목1 | 제목1 | 제목2 |\n|--------|--------|--------|\n| 내용  | 내용  | 내용  |\n| 내용  | 내용  | 내용  |\n';
                    break;
            }

            const newVal = ta.value.slice(0, s) + pre + sel + post + ta.value.slice(e);
            ta.value = newVal;
            ta.focus();
            const cursor = s + pre.length;
            ta.setSelectionRange(cursor, cursor + sel.length);
            updatePreview();
        });
    });

    // Ctrl+B, Ctrl+I shortcuts
    ta.addEventListener('keydown', e => {
        if (e.ctrlKey || e.metaKey) {
            if (e.key === 'b') { e.preventDefault(); document.querySelector('[data-action="bold"]').click(); }
            if (e.key === 'i') { e.preventDefault(); document.querySelector('[data-action="italic"]').click(); }
        }
    });
}

function updatePreview() {
    const val = document.getElementById('editor-textarea').value;
    const pre = document.getElementById('editor-preview');
    pre.innerHTML = marked.parse(val);
    pre.querySelectorAll('pre code').forEach(b => hljs.highlightElement(b));
}

// ────────────────────────────────────────────
// SETTINGS MODAL
// ────────────────────────────────────────────
function openSettings() {
    const cfg = getCfg();
    document.getElementById('pat-input').value    = cfg.pat;
    document.getElementById('owner-input').value  = cfg.owner;
    document.getElementById('repo-input').value   = cfg.repo;
    document.getElementById('branch-input').value = cfg.branch;
    document.getElementById('modal-settings').classList.add('active');
}
function closeSettings() {
    document.getElementById('modal-settings').classList.remove('active');
}
function saveSettings() {
    saveCfg({
        pat:    document.getElementById('pat-input').value.trim(),
        owner:  document.getElementById('owner-input').value.trim() || DEFAULT.owner,
        repo:   document.getElementById('repo-input').value.trim()  || DEFAULT.repo,
        branch: document.getElementById('branch-input').value.trim() || DEFAULT.branch,
    });
    closeSettings();
    updatePatBanner();
    cachedPosts = null;
    if (currentView === 'board') loadBoard(true);
    toast('설정이 저장되었습니다.', 'success');
}

function updatePatBanner() {
    const banner = document.getElementById('no-pat-banner');
    banner.style.display = getCfg().pat ? 'none' : 'flex';
}

// ────────────────────────────────────────────
// EDITOR: PREVIEW TOGGLE & DRAG RESIZE
// ────────────────────────────────────────────
let previewVisible = true;

function togglePreview() {
    previewVisible = !previewVisible;
    const previewPane = document.getElementById('preview-pane');
    const resizer     = document.getElementById('editor-resizer');
    const btn         = document.getElementById('toggle-preview-btn');
    const leftPane    = document.getElementById('editor-left-pane');

    if (previewVisible) {
        previewPane.style.display = '';
        resizer.style.display     = '';
        leftPane.style.flex       = '';
        btn.innerHTML = `<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="vertical-align:-2px;"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg> 미리보기`;
        btn.classList.remove('off');
        btn.title = '미리보기 끄기';
    } else {
        previewPane.style.display = 'none';
        resizer.style.display     = 'none';
        leftPane.style.flex       = '1 1 100%';
        btn.innerHTML = `<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="vertical-align:-2px;"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/><path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/><line x1="1" y1="1" x2="23" y2="23"/></svg> 미리보기`;
        btn.classList.add('off');
        btn.title = '미리보기 켜기';
    }
}

function setupResizer() {
    const resizer  = document.getElementById('editor-resizer');
    const wrap     = document.getElementById('editor-wrap');
    const leftPane = document.getElementById('editor-left-pane');
    let isDragging = false;
    let startX     = 0;
    let startW     = 0;

    resizer.addEventListener('mousedown', e => {
        if (!previewVisible) return;
        isDragging = true;
        startX     = e.clientX;
        startW     = leftPane.getBoundingClientRect().width;
        resizer.classList.add('dragging');
        document.body.style.cursor     = 'col-resize';
        document.body.style.userSelect = 'none';
        e.preventDefault();
    });

    document.addEventListener('mousemove', e => {
        if (!isDragging) return;
        const wrapW  = wrap.getBoundingClientRect().width;
        const newW   = startW + (e.clientX - startX);
        const pct    = Math.max(20, Math.min(80, (newW / wrapW) * 100));
        leftPane.style.flex = `0 0 ${pct}%`;
    });

    document.addEventListener('mouseup', () => {
        if (!isDragging) return;
        isDragging = false;
        resizer.classList.remove('dragging');
        document.body.style.cursor     = '';
        document.body.style.userSelect = '';
    });
}

// ────────────────────────────────────────────
// INIT
// ────────────────────────────────────────────
document.addEventListener('DOMContentLoaded', () => {

    // Marked config
    marked.use({ gfm: true, breaks: true });

    // Header scroll effect
    window.addEventListener('scroll', () => {
        document.getElementById('header').classList.toggle('scrolled', window.scrollY > 10);
    }, { passive: true });

    // Navigation
    document.getElementById('logo-btn').addEventListener('click', e => { e.preventDefault(); loadBoard(); });
    document.getElementById('write-btn').addEventListener('click', () => showWrite('create'));
    document.getElementById('back-btn').addEventListener('click', () => loadBoard());
    document.getElementById('write-back-btn').addEventListener('click', () => { editMode = { active: false }; loadBoard(); });
    document.getElementById('write-cancel-btn').addEventListener('click', () => { editMode = { active: false }; loadBoard(); });

    // Edit / Delete buttons
    document.getElementById('edit-post-btn').addEventListener('click', () => showWrite('edit'));
    document.getElementById('delete-post-btn').addEventListener('click', openDeleteModal);
    document.getElementById('delete-modal-close').addEventListener('click', closeDeleteModal);
    document.getElementById('delete-modal-cancel').addEventListener('click', closeDeleteModal);
    document.getElementById('delete-modal-confirm').addEventListener('click', confirmDelete);
    document.getElementById('modal-delete').addEventListener('click', e => {
        if (e.target.id === 'modal-delete') closeDeleteModal();
    });

    // Settings
    document.getElementById('settings-btn').addEventListener('click', openSettings);
    document.getElementById('modal-close').addEventListener('click', closeSettings);
    document.getElementById('modal-cancel').addEventListener('click', closeSettings);
    document.getElementById('modal-save').addEventListener('click', saveSettings);
    document.getElementById('banner-settings-link').addEventListener('click', openSettings);
    document.getElementById('modal-settings').addEventListener('click', e => {
        if (e.target.id === 'modal-settings') closeSettings();
    });
    // Close modals on Escape
    document.addEventListener('keydown', e => {
        if (e.key === 'Escape') {
            if (document.getElementById('modal-settings').classList.contains('active')) closeSettings();
            if (document.getElementById('modal-delete').classList.contains('active'))   closeDeleteModal();
        }
    });

    // Publish
    document.getElementById('publish-btn').addEventListener('click', publishPost);

    // Live preview
    document.getElementById('editor-textarea').addEventListener('input', updatePreview);

    // Toolbar
    setupToolbar();

    // Preview toggle & resizer
    document.getElementById('toggle-preview-btn').addEventListener('click', togglePreview);
    setupResizer();

    // Kick off
    updatePatBanner();
    loadBoard();
});
</script>
